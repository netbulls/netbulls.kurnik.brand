<style>

-01", "parent": "T2-12", "desc": "T212-R6-01 Bolder brackets (7px) + bolder arrow shaft (8px) + bigger arrowhead", "file": "T212-R6-01.svg"}, {"id": "T212-R6-02", "parent": "T2-12", "desc": "T212-R6-02 Brackets + upward arrow (shaft + triangular head pointing up)", "file": "T212-R6-02.svg"}, {"id": "T212-R6-03", "parent": "T2-12", "desc": "T212-R6-03 Brackets + upward-right diagonal arrow (45 degrees)", "file": "T212-R6-03.svg"}, {"id": "T212-R6-04", "parent": "T2-12", "desc": "T212-R6-04 Even tighter brackets (24,24 inset range) + right arrow", "file": "T212-R6-04.svg"}, {"id": "T212-R6-05", "parent": "T2-12", "desc": "T212-R6-05 Brackets + right arrow + small circle at arrow origin (launch point)", "file": "T212-R6-05.svg"}, {"id": "T212-R6-06", "parent": "T2-12", "desc": "T212-R6-06 Filled solid L-shape brackets (polygon) + bold right arrow", "file": "T212-R6-06.svg"}, {"id": "T212-R6-07", "parent": "T2-12", "desc": "T212-R6-07 Filled solid L-shape brackets + upward arrow", "file": "T212-R6-07.svg"}, {"id": "T212-R6-08", "parent": "T2-12", "desc": "T212-R6-08 Brackets + two stacked chevrons pointing up-right inside", "file": "T212-R6-08.svg"}, {"id": "T212-R6-09", "parent": "T2-12", "desc": "T212-R6-09 Brackets + single large bold chevron pointing right (no shaft, just V-shape)", "file": "T212-R6-09.svg"}, {"id": "T212-R6-10", "parent": "T2-12", "desc": "T212-R6-10 Brackets + bold upward arrow where arrowhead breaks past the top bracket line", "file": "T212-R6-10.svg"}, {"id": "T502-R6-01", "parent": "T5-02", "desc": "T502-R6-01 Three bold levels from T502-08 base \u2014 bigger bars, bolder pyramid", "file": "T502-R6-01.svg"}, {"id": "T502-R6-02", "parent": "T5-02", "desc": "T502-R6-02 Three wide stepped levels from T502-11 base \u2014 wider steps", "file": "T502-R6-02.svg"}, {"id": "T502-R6-03", "parent": "T5-02", "desc": "T502-R6-03 Four levels like T502-08 but top bar is stroke only \u2014 aspiration vs foundation", "file": "T502-R6-03.svg"}, {"id": "T502-R6-04", "parent": "T5-02", "desc": "T502-R6-04 Three levels \u2014 bottom and middle filled, top as upward chevron breaking out", "file": "T502-R6-04.svg"}, {"id": "T502-R6-05", "parent": "T5-02", "desc": "T502-R6-05 Five levels \u2014 ultra-fine graduation from wide base to tiny top point", "file": "T502-R6-05.svg"}, {"id": "T502-R6-06", "parent": "T5-02", "desc": "T502-R6-06 T502-11 with expanding gaps between levels \u2014 wider gaps toward top", "file": "T502-R6-06.svg"}, {"id": "T502-R6-07", "parent": "T5-02", "desc": "T502-R6-07 Inverted T502-08 \u2014 narrowest at bottom, widest at top \u2014 funnel/growth", "file": "T502-R6-07.svg"}, {"id": "T502-R6-08", "parent": "T5-02", "desc": "T502-R6-08 Three levels centered with thin vertical line connecting them through center", "file": "T502-R6-08.svg"}, {"id": "T502-R6-09", "parent": "T5-02", "desc": "T502-R6-09 T502-08 but all bars same height \u2014 different widths only \u2014 cleaner pyramid silhouette", "file": "T502-R6-09.svg"}, {"id": "T502-R6-10", "parent": "T5-02", "desc": "T502-R6-10 Three bold filled levels plus tiny diamond at the very top \u2014 the product crowning the pyramid", "file": "T502-R6-10.svg"}];
const parents={"B25": {"name": "Arrow Void", "rating": 4, "round": "R02"}, "H15": {"name": "Bracket Cross", "rating": 5, "round": "R02"}, "H15-19": {"name": "Bracket Arrows Inward", "rating": 5, "round": "R05"}, "H20": {"name": "Compass Rose", "rating": 4, "round": "R02"}, "F20": {"name": "Chevron Cascade", "rating": 4, "round": "R02"}, "T2-12": {"name": "Bracket + Arrow", "rating": 5, "round": "R03"}, "E26": {"name": "Convergent Triangles", "rating": 4, "round": "R02"}, "F06": {"name": "Split Diamond", "rating": 4, "round": "R02"}, "G12": {"name": "Isometric Planes", "rating": 4, "round": "R02"}, "T5-02": {"name": "Stacked Pyramid", "rating": 5, "round": "R03"}, "T1-10": {"name": "Rotated Squares", "rating": 5, "round": "R03"}};
const parentOrder=["B25", "E26", "F06", "F20", "G12", "H15", "H15-19", "H20", "T1-10", "T2-12", "T5-02"];
const originPaths={"B25": "round-02/B25.svg", "H15": "round-02/H15.svg", "H15-19": "round-05/H15-19.svg", "H20": "round-02/H20.svg", "F20": "round-02/F20.svg", "T2-12": "round-03/T2-12.svg", "E26": "round-02/E26.svg", "F06": "round-02/F06.svg", "G12": "round-02/G12.svg", "T5-02": "round-03/T5-02.svg", "T1-10": "round-03/T1-10.svg"};
let currentFilter='all',filteredList=[...concepts],lbIndex=-1;
function loadState(){try{return JSON.parse(localStorage.getItem(SK))||{}}catch{return{}}}
function saveState(s){localStorage.setItem(SK,JSON.stringify(s));updateStatus()}
function getS(id){const s=loadState();return s[id]||{rating:0,comment:'',tags:[],shortlisted:false}}
function setS(id,d){const s=loadState();s[id]={...getS(id),...d};saveState(s)}
function updateStatus(){const s=loadState();const r=Object.values(s).filter(x=>x.comment||x.rating>0||(x.tags&&x.tags.length>0)||x.shortlisted).length;document.getElementById('status').textContent=r+'/110 reviewed';const sl=Object.entries(s).filter(([k,v])=>v.shortlisted).length;const sc=document.getElementById('shortlist-count');if(sc)sc.textContent=sl}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}
function buildExport(){const s=loadState();return concepts.map(c=>{const st=s[c.id]||{rating:0,comment:'',tags:[],shortlisted:false};return{id:c.id,parent:c.parent,parentName:parents[c.parent]?.name||'',rating:st.rating,tags:st.tags||[],shortlisted:!!st.shortlisted,comment:st.comment||''}}).filter(c=>c.rating>0||c.comment||c.tags.length>0||c.shortlisted)}
function exportJSON(){const d=buildExport();if(!d.length){showToast('Nothing yet');return};const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='kurnik-r06-review.json';a.click();showToast('Exported '+d.length)}
function copyJSON(){const d=buildExport();if(!d.length){showToast('Nothing yet');return};navigator.clipboard.writeText(JSON.stringify(d,null,2)).then(()=>showToast('Copied'))}
function clearAll(){if(!confirm('Clear everything?'))return;localStorage.removeItem(SK);render();showToast('Cleared')}
function toggleShortlist(id){if(!id&&lbIndex>=0)id=filteredList[lbIndex].id;if(!id)return;const s=getS(id);setS(id,{shortlisted:!s.shortlisted});render();if(lbIndex>=0)updateLightbox()}
function render(){const content=document.getElementById('content');content.innerHTML='';const state=loadState();if(currentFilter==='shortlist'){filteredList=concepts.filter(c=>(state[c.id]||{}).shortlisted);const grid=document.createElement('div');grid.className='grid';grid.style.padding='24px 48px';filteredList.forEach((c,i)=>grid.appendChild(makeCard(c,i,state)));if(!filteredList.length){content.innerHTML='<p style="padding:48px;color:var(--text-dim)">No shortlisted variants yet.</p>';return};content.appendChild(grid)}else if(currentFilter==='all'){filteredList=[...concepts];parentOrder.forEach(pid=>{const items=concepts.filter(c=>c.parent===pid);if(!items.length)return;const p=parents[pid];const hdr=document.createElement('div');hdr.className='section-header';hdr.innerHTML='<h2>'+pid+' — '+p.name+'</h2><span class="section-meta">'+p.round+' / strength '+p.rating+' / '+items.length+' variants</span>';content.appendChild(hdr);const orig=document.createElement('div');orig.className='section-origin';orig.innerHTML='<div class="origin-card"><img src="'+originPaths[pid]+'" alt="'+pid+'"></div><span class="origin-label">Source: '+pid+'</span>';content.appendChild(orig);const grid=document.createElement('div');grid.className='grid';items.forEach(c=>{const gi=filteredList.indexOf(c);grid.appendChild(makeCard(c,gi,state))});content.appendChild(grid)})}else{filteredList=concepts.filter(c=>c.parent===currentFilter);const p=parents[currentFilter];if(p){const hdr=document.createElement('div');hdr.className='section-header';hdr.innerHTML='<h2>'+currentFilter+' — '+p.name+'</h2><span class="section-meta">'+p.round+' / strength '+p.rating+' / '+filteredList.length+' variants</span>';content.appendChild(hdr);const orig=document.createElement('div');orig.className='section-origin';orig.innerHTML='<div class="origin-card"><img src="'+originPaths[currentFilter]+'" alt="'+currentFilter+'"></div><span class="origin-label">Source: '+currentFilter+'</span>';content.appendChild(orig)};const grid=document.createElement('div');grid.className='grid';filteredList.forEach((c,i)=>grid.appendChild(makeCard(c,i,state)));content.appendChild(grid)};updateStatus()}
function makeCard(c,idx,state){const s=state[c.id]||{};const card=document.createElement('div');card.className='card'+(s.shortlisted?' shortlisted':'');const hasR=s.comment||s.rating>0||(s.tags&&s.tags.length>0);if(hasR){card.style.borderLeftWidth='3px';card.style.borderLeftColor='var(--amber)'};let desc=c.desc.replace(/^[A-Z0-9]+-R6-\d+\s+/i,'');card.innerHTML=`<div class="preview"><img src="round-06/${c.file}" alt="${c.id}"></div><div class="card-id">${c.id}</div><div class="card-desc">${desc}</div><button class="star-btn" onclick="event.stopPropagation();toggleShortlist('${c.id}')">${s.shortlisted?'\u2605':'\u2606'}</button>`;card.addEventListener('click',()=>openLightbox(idx));return card}
function openLightbox(idx){lbIndex=idx;updateLightbox();document.getElementById('lightbox').classList.add('open')}
function closeLightbox(){document.getElementById('lightbox').classList.remove('open');lbIndex=-1}
function navLightbox(dir){if(lbIndex<0)return;lbIndex=(lbIndex+dir+filteredList.length)%filteredList.length;updateLightbox()}
function updateLightbox(){if(lbIndex<0||!filteredList[lbIndex])return;const c=filteredList[lbIndex];const s=getS(c.id);document.getElementById('lb-svg').innerHTML='<img src="round-06/'+c.file+'" alt="'+c.id+'">';let desc=c.desc.replace(/^[A-Z0-9]+-R6-\d+\s+/i,'');document.getElementById('lb-id').textContent=c.id+' ('+c.parent+' — '+(parents[c.parent]?.name||'')+')';document.getElementById('lb-desc').textContent=desc;document.getElementById('lb-star-btn').innerHTML=(s.shortlisted?'\u2605':'\u2606')+' Shortlist';const rh=document.getElementById('lb-rating');rh.innerHTML=[1,2,3,4,5].map(n=>'<div class="rating-dot '+(s.rating===n?'active':'')+'" onclick="setLbRating('+n+')">'+n+'</div>').join('');const th=document.getElementById('lb-tags');th.innerHTML=TAGS.map(t=>'<button class="ltag '+((s.tags||[]).includes(t)?'active':'')+'" onclick="toggleLbTag(\''+t+'\')">'+t+'</button>').join('');const cm=document.getElementById('lb-comment');cm.value=s.comment||'';cm.oninput=()=>{clearTimeout(cm._t);cm._t=setTimeout(()=>setS(c.id,{comment:cm.value}),300)}}
function setLbRating(n){const c=filteredList[lbIndex];if(!c)return;const s=getS(c.id);const v=s.rating===n?0:n;setS(c.id,{rating:v});updateLightbox();render()}
function toggleLbTag(t){const c=filteredList[lbIndex];if(!c)return;const s=getS(c.id);const tags=s.tags||[];const idx=tags.indexOf(t);if(idx>=0)tags.splice(idx,1);else tags.push(t);setS(c.id,{tags});updateLightbox()}
document.getElementById('tabs').addEventListener('click',e=>{const tab=e.target.closest('.tab');if(!tab)return;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));tab.classList.add('active');currentFilter=tab.dataset.filter;render()});
document.addEventListener('keydown',e=>{if(e.target.tagName==='TEXTAREA')return;if(e.key==='Escape')closeLightbox();if(e.key==='ArrowLeft')navLightbox(-1);if(e.key==='ArrowRight')navLightbox(1);if(e.key==='s'&&lbIndex>=0)toggleShortlist();if((e.metaKey||e.ctrlKey)&&e.key==='e'){e.preventDefault();exportJSON()}});
render();
</script>
