<!-- T110-R6-01 Three nested squares with bolder strokes (8/6/5) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect x="8" y="8" width="84" height="84" fill="none" stroke="#d4840a" stroke-width="8" stroke-linecap="butt" stroke-linejoin="miter"/>
  <rect x="22" y="22" width="56" height="56" fill="none" stroke="#d4840a" stroke-width="6" stroke-linecap="butt" stroke-linejoin="miter" transform="rotate(22.5 50 50)"/>
  <rect x="32" y="32" width="36" height="36" fill="none" stroke="#d4840a" stroke-width="5" stroke-linecap="butt" stroke-linejoin="miter" transform="rotate(45 50 50)"/>
</svg>
