<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- H20-R6-09 Asymmetric compass — north and east bold, south and west smaller/thinner, upward-right bias -->
  <!-- North wedge — bold -->
  <polygon points="46,38 54,38 50,6" fill="#d4840a"/>
  <!-- East wedge — bold -->
  <polygon points="62,46 62,54 94,50" fill="#d4840a"/>
  <!-- South wedge — thin -->
  <polygon points="51,58 49,58 50,82" fill="#d4840a"/>
  <!-- West wedge — thin -->
  <polygon points="42,51 42,49 18,50" fill="#d4840a"/>
</svg>
