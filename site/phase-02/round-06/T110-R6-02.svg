<!-- T110-R6-02 Four nested squares graduating rotation (0/15/30/45) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect x="6" y="6" width="88" height="88" fill="none" stroke="#d4840a" stroke-width="7" stroke-linecap="butt" stroke-linejoin="miter"/>
  <rect x="18" y="18" width="64" height="64" fill="none" stroke="#d4840a" stroke-width="6" stroke-linecap="butt" stroke-linejoin="miter" transform="rotate(15 50 50)"/>
  <rect x="27" y="27" width="46" height="46" fill="none" stroke="#d4840a" stroke-width="5" stroke-linecap="butt" stroke-linejoin="miter" transform="rotate(30 50 50)"/>
  <rect x="35" y="35" width="30" height="30" fill="none" stroke="#d4840a" stroke-width="4" stroke-linecap="butt" stroke-linejoin="miter" transform="rotate(45 50 50)"/>
</svg>
