  <line x1="56" y1="50" x2="84" y2="50" stroke="#d4840a" stroke-width="4" stroke-linecap="butt"/>
  <line x1="50" y1="16" x2="50" y2="44" stroke="#d4840a" stroke-width="4" stroke-linecap="butt"/>
  <line x1="50" y1="56" x2="50" y2="84" stroke="#d4840a" stroke-width="4" stroke-linecap="butt"/>
  <circle cx="50" cy="50" r="5" fill="#d4840a"/>
