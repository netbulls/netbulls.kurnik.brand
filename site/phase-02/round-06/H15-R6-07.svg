<!-- H15-R6-07 Filled L-shape brackets (solid polygons) + bold cross + center dot -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Filled L-shape corner brackets as solid polygons -->
  <!-- Top-left -->
  <polygon points="22,22 42,22 42,28 28,28 28,42 22,42" fill="#d4840a"/>
  <!-- Top-right -->
  <polygon points="78,22 78,42 72,42 72,28 58,28 58,22" fill="#d4840a"/>
  <!-- Bottom-right -->
  <polygon points="78,78 58,78 58,72 72,72 72,58 78,58" fill="#d4840a"/>
  <!-- Bottom-left -->
  <polygon points="22,78 22,58 28,58 28,72 42,72 42,78" fill="#d4840a"/>
  <!-- Bold cross -->
  <line x1="14" y1="50" x2="43" y2="50" stroke="#d4840a" stroke-width="4" stroke-linecap="butt"/>
  <line x1="57" y1="50" x2="86" y2="50" stroke="#d4840a" stroke-width="4" stroke-linecap="butt"/>
  <line x1="50" y1="14" x2="50" y2="43" stroke="#d4840a" stroke-width="4" stroke-linecap="butt"/>
  <line x1="50" y1="57" x2="50" y2="86" stroke="#d4840a" stroke-width="4" stroke-linecap="butt"/>
  <!-- Center dot -->
  <circle cx="50" cy="50" r="6" fill="#d4840a"/>
</svg>
