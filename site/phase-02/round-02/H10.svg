<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- H10: Floating Dots — interrupted crosshair with dots at consistent offsets -->
  <line x1="10" y1="50" x2="40" y2="50" stroke="#d4840a" stroke-width="2" stroke-linecap="butt"/>
  <line x1="60" y1="50" x2="90" y2="50" stroke="#d4840a" stroke-width="2" stroke-linecap="butt"/>
  <line x1="50" y1="10" x2="50" y2="40" stroke="#d4840a" stroke-width="2" stroke-linecap="butt"/>
  <line x1="50" y1="60" x2="50" y2="90" stroke="#d4840a" stroke-width="2" stroke-linecap="butt"/>
  <!-- Floating dots at 45° positions -->
  <circle cx="36" cy="36" r="2.5" fill="#d4840a"/>
  <circle cx="64" cy="36" r="2.5" fill="#d4840a"/>
  <circle cx="36" cy="64" r="2.5" fill="#d4840a"/>
  <circle cx="64" cy="64" r="2.5" fill="#d4840a"/>
</svg>
