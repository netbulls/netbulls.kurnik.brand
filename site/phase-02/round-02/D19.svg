<rect x="47" y="14" width="6" height="16" fill="#d4840a" transform="rotate(60,50,50)"/>
<rect x="47" y="14" width="6" height="16" fill="#d4840a" transform="rotate(120,50,50)"/>
<rect x="47" y="14" width="6" height="16" fill="#d4840a" transform="rotate(180,50,50)"/>
<rect x="47" y="14" width="6" height="16" fill="#d4840a" transform="rotate(240,50,50)"/>
<rect x="47" y="14" width="6" height="16" fill="#d4840a" transform="rotate(300,50,50)"/>
