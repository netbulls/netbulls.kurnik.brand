<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- H20: Asymmetric Rose — 4 arms at 0/90° thin, 4 short arms at 45° thick -->
  <!-- Cardinal arms (thin, long) -->
  <line x1="50" y1="10" x2="50" y2="40" stroke="#d4840a" stroke-width="1.5" stroke-linecap="butt"/>
  <line x1="60" y1="50" x2="90" y2="50" stroke="#d4840a" stroke-width="1.5" stroke-linecap="butt"/>
  <line x1="50" y1="60" x2="50" y2="90" stroke="#d4840a" stroke-width="1.5" stroke-linecap="butt"/>
  <line x1="10" y1="50" x2="40" y2="50" stroke="#d4840a" stroke-width="1.5" stroke-linecap="butt"/>
  <!-- Diagonal arms (thick, short) -->
  <line x1="36" y1="36" x2="44" y2="44" stroke="#d4840a" stroke-width="3.5" stroke-linecap="butt"/>
  <line x1="56" y1="44" x2="64" y2="36" stroke="#d4840a" stroke-width="3.5" stroke-linecap="butt"/>
  <line x1="56" y1="56" x2="64" y2="64" stroke="#d4840a" stroke-width="3.5" stroke-linecap="butt"/>
  <line x1="36" y1="64" x2="44" y2="56" stroke="#d4840a" stroke-width="3.5" stroke-linecap="butt"/>
</svg>
