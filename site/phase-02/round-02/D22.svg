<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
<!-- D22 Razor Hex — six very thin long lines at 60°, minimal center gap -->
<line x1="50" y1="8" x2="50" y2="44" stroke="#d4840a" stroke-width="2" stroke-linecap="butt" transform="rotate(0,50,50)"/>
<line x1="50" y1="8" x2="50" y2="44" stroke="#d4840a" stroke-width="2" stroke-linecap="butt" transform="rotate(60,50,50)"/>
<line x1="50" y1="8" x2="50" y2="44" stroke="#d4840a" stroke-width="2" stroke-linecap="butt" transform="rotate(120,50,50)"/>
<line x1="50" y1="8" x2="50" y2="44" stroke="#d4840a" stroke-width="2" stroke-linecap="butt" transform="rotate(180,50,50)"/>
<line x1="50" y1="8" x2="50" y2="44" stroke="#d4840a" stroke-width="2" stroke-linecap="butt" transform="rotate(240,50,50)"/>
<line x1="50" y1="8" x2="50" y2="44" stroke="#d4840a" stroke-width="2" stroke-linecap="butt" transform="rotate(300,50,50)"/>
</svg>