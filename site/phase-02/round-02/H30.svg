<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- H30: Compound Instrument — bracket frame + interrupted cross + floating arc -->
  <!-- Corner brackets (small, tight) -->
  <path d="M22,28 L22,22 L28,22" fill="none" stroke="#d4840a" stroke-width="2" stroke-linecap="butt" stroke-linejoin="miter"/>
  <path d="M72,22 L78,22 L78,28" fill="none" stroke="#d4840a" stroke-width="2" stroke-linecap="butt" stroke-linejoin="miter"/>
  <path d="M78,72 L78,78 L72,78" fill="none" stroke="#d4840a" stroke-width="2" stroke-linecap="butt" stroke-linejoin="miter"/>
  <path d="M28,78 L22,78 L22,72" fill="none" stroke="#d4840a" stroke-width="2" stroke-linecap="butt" stroke-linejoin="miter"/>
  <!-- Interrupted cross (inside brackets) -->
  <line x1="34" y1="50" x2="44" y2="50" stroke="#d4840a" stroke-width="1.5" stroke-linecap="butt"/>
  <line x1="56" y1="50" x2="66" y2="50" stroke="#d4840a" stroke-width="1.5" stroke-linecap="butt"/>
  <line x1="50" y1="34" x2="50" y2="44" stroke="#d4840a" stroke-width="1.5" stroke-linecap="butt"/>
  <line x1="50" y1="56" x2="50" y2="66" stroke="#d4840a" stroke-width="1.5" stroke-linecap="butt"/>
  <!-- Floating arc (upper right quadrant) -->
  <path d="M56,38 A14,14 0 0,1 62,44" fill="none" stroke="#d4840a" stroke-width="2" stroke-linecap="butt"/>
</svg>
