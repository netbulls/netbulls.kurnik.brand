<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- H22: Hairline Overlay — thin full crosshair with thick partial arms overlay -->
  <!-- Thin full cross -->
  <line x1="10" y1="50" x2="90" y2="50" stroke="#d4840a" stroke-width="1" stroke-linecap="butt"/>
  <line x1="50" y1="10" x2="50" y2="90" stroke="#d4840a" stroke-width="1" stroke-linecap="butt"/>
  <!-- Thick partial arms (asymmetric lengths) -->
  <line x1="50" y1="10" x2="50" y2="34" stroke="#d4840a" stroke-width="4" stroke-linecap="butt"/>
  <line x1="66" y1="50" x2="90" y2="50" stroke="#d4840a" stroke-width="4" stroke-linecap="butt"/>
  <line x1="50" y1="66" x2="50" y2="90" stroke="#d4840a" stroke-width="4" stroke-linecap="butt"/>
</svg>
