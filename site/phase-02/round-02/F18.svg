<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
<!-- F18 Pentagon Split — pentagon with diagonal cut, top half filled, bottom half outline -->
<defs><clipPath id="top18"><rect x="0" y="0" width="100" height="50"/></clipPath><clipPath id="bot18"><rect x="0" y="50" width="100" height="50"/></clipPath></defs>
<polygon points="50,18 80,38 70,72 30,72 20,38" fill="#d4840a" clip-path="url(#top18)"/>
<polygon points="50,18 80,38 70,72 30,72 20,38" fill="none" stroke="#d4840a" stroke-width="3" stroke-linejoin="miter" clip-path="url(#bot18)"/>
</svg>
