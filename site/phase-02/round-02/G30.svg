<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
<!-- G30 Impossible Overlap — Two interlocking rectangles that appear to pass through each other -->
<rect x="20" y="30" width="40" height="18" fill="#d4840a" stroke-linecap="butt" stroke-linejoin="miter"/>
<rect x="40" y="52" width="40" height="18" fill="#d4840a" stroke-linecap="butt" stroke-linejoin="miter"/>
<rect x="40" y="30" width="8" height="40" fill="none" stroke="#d4840a" stroke-width="2.5" stroke-linecap="butt" stroke-linejoin="miter"/>
</svg>
