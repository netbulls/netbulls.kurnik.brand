  <line x1="10" y1="56" x2="90" y2="56" stroke="#d4840a" stroke-width="2" stroke-linecap="butt"/>
  <line x1="44" y1="10" x2="44" y2="90" stroke="#d4840a" stroke-width="2" stroke-linecap="butt"/>
  <line x1="56" y1="10" x2="56" y2="90" stroke="#d4840a" stroke-width="2" stroke-linecap="butt"/>
</svg>
