<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- H12: Micrometer — ruler edge with ticks meeting angled element -->
  <line x1="16" y1="70" x2="84" y2="70" stroke="#d4840a" stroke-width="2.5" stroke-linecap="butt"/>
  <!-- Major ticks -->
  <line x1="24" y1="70" x2="24" y2="56" stroke="#d4840a" stroke-width="2" stroke-linecap="butt"/>
  <line x1="44" y1="70" x2="44" y2="56" stroke="#d4840a" stroke-width="2" stroke-linecap="butt"/>
  <line x1="64" y1="70" x2="64" y2="56" stroke="#d4840a" stroke-width="2" stroke-linecap="butt"/>
  <!-- Minor ticks -->
  <line x1="34" y1="70" x2="34" y2="62" stroke="#d4840a" stroke-width="1.5" stroke-linecap="butt"/>
  <line x1="54" y1="70" x2="54" y2="62" stroke="#d4840a" stroke-width="1.5" stroke-linecap="butt"/>
  <line x1="74" y1="70" x2="74" y2="62" stroke="#d4840a" stroke-width="1.5" stroke-linecap="butt"/>
  <!-- Angled indicator -->
  <line x1="44" y1="56" x2="58" y2="24" stroke="#d4840a" stroke-width="2" stroke-linecap="butt"/>
  <circle cx="58" cy="24" r="3" fill="none" stroke="#d4840a" stroke-width="1.5"/>
</svg>
