<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
<!-- D15 Six-Point Inward — six small triangles at 60° all pointing toward center -->
<polygon points="50,12 44,26 56,26" fill="#d4840a" transform="rotate(0,50,50)"/>
<polygon points="50,12 44,26 56,26" fill="#d4840a" transform="rotate(60,50,50)"/>
<polygon points="50,12 44,26 56,26" fill="#d4840a" transform="rotate(120,50,50)"/>
<polygon points="50,12 44,26 56,26" fill="#d4840a" transform="rotate(180,50,50)"/>
<polygon points="50,12 44,26 56,26" fill="#d4840a" transform="rotate(240,50,50)"/>
<polygon points="50,12 44,26 56,26" fill="#d4840a" transform="rotate(300,50,50)"/>
</svg>