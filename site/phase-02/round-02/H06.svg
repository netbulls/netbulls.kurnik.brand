<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- H06: Graduated Axis — vertical line with asymmetric tick marks -->
  <line x1="50" y1="8" x2="50" y2="92" stroke="#d4840a" stroke-width="2" stroke-linecap="butt"/>
  <!-- Major ticks (left side, long) -->
  <line x1="30" y1="20" x2="50" y2="20" stroke="#d4840a" stroke-width="2" stroke-linecap="butt"/>
  <line x1="30" y1="40" x2="50" y2="40" stroke="#d4840a" stroke-width="2" stroke-linecap="butt"/>
  <line x1="30" y1="60" x2="50" y2="60" stroke="#d4840a" stroke-width="2" stroke-linecap="butt"/>
  <line x1="30" y1="80" x2="50" y2="80" stroke="#d4840a" stroke-width="2" stroke-linecap="butt"/>
  <!-- Minor ticks (right side, short) -->
  <line x1="50" y1="30" x2="60" y2="30" stroke="#d4840a" stroke-width="1.5" stroke-linecap="butt"/>
  <line x1="50" y1="50" x2="60" y2="50" stroke="#d4840a" stroke-width="1.5" stroke-linecap="butt"/>
  <line x1="50" y1="70" x2="60" y2="70" stroke="#d4840a" stroke-width="1.5" stroke-linecap="butt"/>
</svg>
