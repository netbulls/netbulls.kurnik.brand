<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
<!-- D09 Hex Spokes Varied — six lines at 60°, alternating thick/thin -->
<line x1="50" y1="12" x2="50" y2="38" stroke="#d4840a" stroke-width="6" stroke-linecap="butt" transform="rotate(0,50,50)"/>
<line x1="50" y1="16" x2="50" y2="38" stroke="#d4840a" stroke-width="3" stroke-linecap="butt" transform="rotate(60,50,50)"/>
<line x1="50" y1="12" x2="50" y2="38" stroke="#d4840a" stroke-width="6" stroke-linecap="butt" transform="rotate(120,50,50)"/>
<line x1="50" y1="16" x2="50" y2="38" stroke="#d4840a" stroke-width="3" stroke-linecap="butt" transform="rotate(180,50,50)"/>
<line x1="50" y1="12" x2="50" y2="38" stroke="#d4840a" stroke-width="6" stroke-linecap="butt" transform="rotate(240,50,50)"/>
<line x1="50" y1="16" x2="50" y2="38" stroke="#d4840a" stroke-width="3" stroke-linecap="butt" transform="rotate(300,50,50)"/>
</svg>