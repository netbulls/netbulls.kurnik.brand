<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- H23: Offset Circles — two circles at different scales, line through both centers -->
  <circle cx="38" cy="50" r="22" fill="none" stroke="#d4840a" stroke-width="2"/>
  <circle cx="68" cy="50" r="12" fill="none" stroke="#d4840a" stroke-width="2"/>
  <line x1="10" y1="50" x2="86" y2="50" stroke="#d4840a" stroke-width="1.5" stroke-linecap="butt"/>
  <!-- Center marks -->
  <line x1="38" y1="44" x2="38" y2="56" stroke="#d4840a" stroke-width="1.5" stroke-linecap="butt"/>
  <line x1="68" y1="44" x2="68" y2="56" stroke="#d4840a" stroke-width="1.5" stroke-linecap="butt"/>
</svg>
