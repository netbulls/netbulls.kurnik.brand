<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- H17: T-Junction — vertical meets horizontal, with graduated ticks -->
  <line x1="50" y1="14" x2="50" y2="72" stroke="#d4840a" stroke-width="2.5" stroke-linecap="butt"/>
  <line x1="14" y1="72" x2="86" y2="72" stroke="#d4840a" stroke-width="2.5" stroke-linecap="butt"/>
  <!-- Ticks on vertical -->
  <line x1="44" y1="28" x2="56" y2="28" stroke="#d4840a" stroke-width="1.5" stroke-linecap="butt"/>
  <line x1="46" y1="42" x2="54" y2="42" stroke="#d4840a" stroke-width="1.5" stroke-linecap="butt"/>
  <line x1="44" y1="56" x2="56" y2="56" stroke="#d4840a" stroke-width="1.5" stroke-linecap="butt"/>
  <!-- Ticks on horizontal -->
  <line x1="28" y1="66" x2="28" y2="78" stroke="#d4840a" stroke-width="1.5" stroke-linecap="butt"/>
  <line x1="72" y1="66" x2="72" y2="78" stroke="#d4840a" stroke-width="1.5" stroke-linecap="butt"/>
</svg>
