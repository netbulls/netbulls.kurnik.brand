  <line x1="50" y1="60" x2="50" y2="90" stroke="#d4840a" stroke-width="2" stroke-linecap="butt"/>
  <!-- Dots along arms -->
  <circle cx="22" cy="50" r="2.5" fill="#d4840a"/>
  <circle cx="34" cy="50" r="2.5" fill="#d4840a"/>
  <circle cx="66" cy="50" r="2.5" fill="#d4840a"/>
  <circle cx="78" cy="50" r="2.5" fill="#d4840a"/>
