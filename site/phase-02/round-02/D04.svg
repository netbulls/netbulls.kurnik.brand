<polyline points="42,16 50,30 58,16" fill="none" stroke="#d4840a" stroke-width="5" stroke-linecap="butt" stroke-linejoin="miter" transform="rotate(120,50,50)"/>
<polyline points="42,16 50,30 58,16" fill="none" stroke="#d4840a" stroke-width="5" stroke-linecap="butt" stroke-linejoin="miter" transform="rotate(240,50,50)"/>
</svg>