<!-- C07 Escher Knot — interlocking loops that pass through each other impossibly -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <g fill="none" stroke="#d4840a" stroke-width="7" stroke-linecap="butt" stroke-linejoin="miter">
    <!-- Loop 1 — horizontal oval -->
    <ellipse cx="50" cy="50" rx="34" ry="16"/>
    <!-- Loop 2 — vertical oval -->
    <ellipse cx="50" cy="50" rx="16" ry="34"/>
  </g>
  <!-- Impossible crossings — patches that swap over/under -->
  <g fill="#d4840a" stroke="none">
    <!-- Top crossing: horizontal passes OVER vertical -->
    <rect x="41" y="16" width="18" height="7" rx="0"/>
    <!-- Bottom crossing: horizontal passes OVER vertical again (impossible) -->
    <rect x="41" y="77" width="18" height="7" rx="0"/>
    <!-- Left crossing: vertical passes OVER horizontal -->
    <rect x="16" y="41" width="7" height="18" rx="0"/>
    <!-- Right crossing: vertical passes OVER horizontal again (impossible) -->
    <rect x="77" y="41" width="7" height="18" rx="0"/>
  </g>
</svg>
