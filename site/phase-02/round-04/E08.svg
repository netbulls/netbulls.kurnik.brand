<!-- E08 Diamond Weave — two diamond shapes interlocked at 45 degrees -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <mask id="e08m">
      <rect width="100" height="100" fill="white"/>
      <rect x="42" y="18" width="16" height="16" fill="black" transform="rotate(0)"/>
      <rect x="42" y="66" width="16" height="16" fill="black"/>
    </mask>
  </defs>
  <!-- Outer diamond -->
  <rect x="18" y="18" width="64" height="64" rx="4" fill="none" stroke="#d4840a" stroke-width="6" stroke-linecap="butt" stroke-linejoin="miter" transform="rotate(45 50 50)"/>
  <!-- Inner diamond, smaller, interlocked -->
  <rect x="28" y="28" width="44" height="44" rx="3" fill="none" stroke="#d4840a" stroke-width="6" stroke-linecap="butt" stroke-linejoin="miter" mask="url(#e08m)"/>
</svg>
