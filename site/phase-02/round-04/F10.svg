<!-- F10 Crosswave — two signal sources creating intersecting wave patterns -->
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <g fill="none" stroke="#d4840a" stroke-linecap="butt" stroke-linejoin="miter">
    <!-- Left emitter -->
    <circle cx="20" cy="80" r="4" fill="#d4840a"/>
    <!-- Left source arcs -->
    <path d="M20 80 A12 12 0 0 1 32 68" stroke-width="3.5"/>
    <path d="M20 80 A24 24 0 0 1 44 56" stroke-width="3"/>
    <path d="M20 80 A36 36 0 0 1 56 44" stroke-width="2.5"/>
    <path d="M20 80 A48 48 0 0 1 68 32" stroke-width="2"/>
    <!-- Right emitter -->
    <circle cx="80" cy="80" r="4" fill="#d4840a"/>
    <!-- Right source arcs -->
    <path d="M80 80 A12 12 0 0 0 68 68" stroke-width="3.5"/>
    <path d="M80 80 A24 24 0 0 0 56 56" stroke-width="3"/>
    <path d="M80 80 A36 36 0 0 0 44 44" stroke-width="2.5"/>
    <path d="M80 80 A48 48 0 0 0 32 32" stroke-width="2"/>
  </g>
</svg>
