<!-- F07 Ripple Grid — concentric squares expanding outward -->
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <g fill="none" stroke="#d4840a" stroke-linecap="butt" stroke-linejoin="miter">
    <!-- Center filled square -->
    <rect x="44" y="44" width="12" height="12" fill="#d4840a"/>
    <!-- Expanding square rings -->
    <rect x="35" y="35" width="30" height="30" stroke-width="3.5"/>
    <rect x="25" y="25" width="50" height="50" stroke-width="3"/>
    <rect x="15" y="15" width="70" height="70" stroke-width="2.5"/>
    <rect x="5" y="5" width="90" height="90" stroke-width="2"/>
  </g>
</svg>
