<!-- E05 Quad Braid — four bands weaving through a central square -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <mask id="e05a">
      <rect width="100" height="100" fill="white"/>
      <rect x="44" y="15" width="12" height="30" fill="black"/>
      <rect x="44" y="55" width="12" height="30" fill="black"/>
    </mask>
    <mask id="e05b">
      <rect width="100" height="100" fill="white"/>
      <rect x="15" y="44" width="30" height="12" fill="black"/>
      <rect x="55" y="44" width="30" height="12" fill="black"/>
    </mask>
  </defs>
  <!-- Horizontal band -->
  <path d="M15,42 L85,42 L85,58 L15,58 Z" fill="none" stroke="#d4840a" stroke-width="5" stroke-linecap="butt" stroke-linejoin="miter" mask="url(#e05a)"/>
  <!-- Vertical band -->
  <path d="M42,15 L58,15 L58,85 L42,85 Z" fill="none" stroke="#d4840a" stroke-width="5" stroke-linecap="butt" stroke-linejoin="miter" mask="url(#e05b)"/>
  <!-- Center overlap square -->
  <rect x="42" y="42" width="16" height="16" fill="none" stroke="#d4840a" stroke-width="5" stroke-linecap="butt" stroke-linejoin="miter"/>
</svg>
