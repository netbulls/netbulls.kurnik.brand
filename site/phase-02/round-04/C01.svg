<!-- C01 Penrose Triangle — classic impossible triangle, bold strokes -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <polygon points="50,10 85,70 15,70" fill="none" stroke="#d4840a" stroke-width="8" stroke-linecap="butt" stroke-linejoin="miter"/>
  <!-- Impossible overlap strips -->
  <line x1="50" y1="10" x2="67.5" y2="40" stroke="#d4840a" stroke-width="8" stroke-linecap="butt"/>
  <polygon points="50,26 60,44 40,44" fill="#d4840a" stroke="none"/>
  <!-- Break illusion lines -->
  <line x1="22" y1="58" x2="50" y2="58" stroke="#d4840a" stroke-width="4" stroke-linecap="butt"/>
  <line x1="50" y1="58" x2="78" y2="58" stroke="#d4840a" stroke-width="4" stroke-linecap="butt"/>
  <!-- Inner impossible bar crossings -->
  <rect x="30" y="54" width="14" height="8" fill="#d4840a" rx="0"/>
  <rect x="56" y="54" width="14" height="8" fill="#d4840a" rx="0"/>
  <polygon points="50,26 42,40 58,40" fill="none" stroke="#d4840a" stroke-width="3" stroke-linecap="butt" stroke-linejoin="miter"/>
</svg>
