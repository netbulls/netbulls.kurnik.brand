<!-- E02 Square Knot — two interlocked rounded squares, over-under weave -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <mask id="e02m">
      <rect width="100" height="100" fill="white"/>
      <rect x="28" y="28" width="20" height="20" fill="black"/>
      <rect x="52" y="52" width="20" height="20" fill="black"/>
    </mask>
  </defs>
  <!-- First square, rotated -->
  <rect x="18" y="18" width="40" height="40" rx="6" fill="none" stroke="#d4840a" stroke-width="7" stroke-linecap="butt" stroke-linejoin="miter"/>
  <!-- Second square, offset, with mask to create weave -->
  <rect x="42" y="42" width="40" height="40" rx="6" fill="none" stroke="#d4840a" stroke-width="7" stroke-linecap="butt" stroke-linejoin="miter" mask="url(#e02m)"/>
</svg>
