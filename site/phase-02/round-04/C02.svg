<!-- C02 Impossible Cube — Necker cube with contradictory edges -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <g fill="none" stroke="#d4840a" stroke-width="6" stroke-linecap="butt" stroke-linejoin="miter">
    <!-- Front face -->
    <rect x="20" y="30" width="36" height="36"/>
    <!-- Back face -->
    <rect x="44" y="18" width="36" height="36"/>
    <!-- Connecting edges — deliberately contradictory -->
    <line x1="20" y1="30" x2="44" y2="18"/>
    <line x1="56" y1="30" x2="80" y2="18"/>
    <line x1="56" y1="66" x2="80" y2="54"/>
    <!-- Impossible crossing: back edge passes in front -->
    <line x1="44" y1="54" x2="44" y2="66"/>
    <line x1="20" y1="66" x2="44" y2="54"/>
  </g>
  <!-- Solid bar to create impossible junction -->
  <rect x="41" y="51" width="6" height="18" fill="#d4840a"/>
</svg>
