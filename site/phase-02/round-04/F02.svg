<!-- F02 Radar Sweep — concentric circle arcs with a bold radial line -->
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <g fill="none" stroke="#d4840a" stroke-linecap="butt" stroke-linejoin="miter">
    <!-- Concentric arcs — upper right quadrant -->
    <path d="M50 50 A15 15 0 0 1 65 50" stroke-width="4"/>
    <path d="M50 50 A28 28 0 0 1 78 50" stroke-width="3.5"/>
    <path d="M50 50 A40 40 0 0 1 90 50" stroke-width="3"/>
    <!-- Full concentric rings -->
    <circle cx="50" cy="50" r="15" stroke-width="2.5" opacity="0.4"/>
    <circle cx="50" cy="50" r="28" stroke-width="2.5" opacity="0.3"/>
    <circle cx="50" cy="50" r="40" stroke-width="2.5" opacity="0.2"/>
    <!-- Sweep line -->
    <line x1="50" y1="50" x2="50" y2="10" stroke-width="5"/>
    <!-- Center dot -->
    <circle cx="50" cy="50" r="4" fill="#d4840a"/>
  </g>
</svg>
