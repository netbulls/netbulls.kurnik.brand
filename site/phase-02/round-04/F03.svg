<!-- F03 Pulse Wave — horizontal signal pulse like a heartbeat monitor -->
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <g fill="none" stroke="#d4840a" stroke-linecap="butt" stroke-linejoin="miter">
    <!-- Main pulse line -->
    <polyline points="8,55 25,55 32,55 38,20 44,80 50,35 56,65 62,45 68,55 75,55 92,55" stroke-width="5"/>
    <!-- Echo pulse above, thinner -->
    <polyline points="20,38 30,38 35,28 40,48 45,32 50,42 55,36 60,38 80,38" stroke-width="2.5" opacity="0.5"/>
    <!-- Echo pulse below, thinner -->
    <polyline points="20,72 30,72 35,62 40,82 45,66 50,76 55,70 60,72 80,72" stroke-width="2.5" opacity="0.5"/>
  </g>
</svg>
