<!-- F05 Signal Bars — ascending bars like Wi-Fi strength with arc cap -->
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <g fill="#d4840a" stroke="none">
    <!-- Ascending bars -->
    <rect x="18" y="72" width="10" height="16" rx="1"/>
    <rect x="33" y="58" width="10" height="30" rx="1"/>
    <rect x="48" y="42" width="10" height="46" rx="1"/>
    <rect x="63" y="26" width="10" height="62" rx="1"/>
    <rect x="78" y="12" width="10" height="76" rx="1"/>
  </g>
  <g fill="none" stroke="#d4840a" stroke-linecap="butt" stroke-linejoin="miter">
    <!-- Arc connecting the tops -->
    <path d="M23 72 Q50 -5 83 12" stroke-width="3"/>
  </g>
</svg>
