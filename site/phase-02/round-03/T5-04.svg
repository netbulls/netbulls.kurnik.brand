<!-- T5-04 Iso Cube — isometric cube: top face filled, left and right faces stroke only -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <polygon points="50,18 78,34 50,50 22,34" fill="#d4840a"/>
  <polygon points="22,34 50,50 50,78 22,62" fill="none" stroke="#d4840a" stroke-width="2.5" stroke-linecap="butt" stroke-linejoin="miter"/>
  <polygon points="78,34 50,50 50,78 78,62" fill="none" stroke="#d4840a" stroke-width="2.5" stroke-linecap="butt" stroke-linejoin="miter"/>
</svg>
