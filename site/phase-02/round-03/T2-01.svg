<!-- T2-01 Chevron Arm — crosshair with right arm replaced by chevron -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Left arm -->
  <rect x="8" y="46" width="30" height="8" fill="#d4840a"/>
  <!-- Top arm -->
  <rect x="46" y="8" width="8" height="30" fill="#d4840a"/>
  <!-- Bottom arm -->
  <rect x="46" y="62" width="8" height="30" fill="#d4840a"/>
  <!-- Right arm as chevron -->
  <polyline points="62,38 80,50 62,62" fill="none" stroke="#d4840a" stroke-width="8" stroke-linecap="butt" stroke-linejoin="miter"/>
</svg>
