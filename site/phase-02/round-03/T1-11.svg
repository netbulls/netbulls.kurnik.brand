<!-- T1-11 Offset Converge — four thick bars converging toward center but slightly offset, creating tension -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Left bar — shifted slightly up -->
  <rect x="6" y="43" width="32" height="8" fill="#d4840a"/>
  <!-- Right bar — shifted slightly down -->
  <rect x="62" y="49" width="32" height="8" fill="#d4840a"/>
  <!-- Top bar — shifted slightly right -->
  <rect x="49" y="6" width="8" height="32" fill="#d4840a"/>
  <!-- Bottom bar — shifted slightly left -->
  <rect x="43" y="62" width="8" height="32" fill="#d4840a"/>
</svg>
