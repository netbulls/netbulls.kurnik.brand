<!-- T1-05 L-Shape Crosshair — four thick L-shapes framing center void, filled, no thin cross -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Top-left L -->
  <polygon points="10,10 22,10 22,40 46,40 46,46 10,46" fill="#d4840a"/>
  <!-- Top-right L -->
  <polygon points="90,10 90,46 54,46 54,40 78,40 78,10" fill="#d4840a"/>
  <!-- Bottom-right L -->
  <polygon points="90,90 78,90 78,60 54,60 54,54 90,54" fill="#d4840a"/>
  <!-- Bottom-left L -->
  <polygon points="10,90 10,54 46,54 46,60 22,60 22,90" fill="#d4840a"/>
</svg>
