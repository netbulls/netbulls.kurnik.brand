<!-- T2-09 Stepped Focus — three ascending rectangles left to right + vertical crosshair line -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Step 1 (shortest, left) -->
  <rect x="14" y="56" width="18" height="28" fill="#d4840a"/>
  <!-- Step 2 (mid) -->
  <rect x="38" y="38" width="18" height="46" fill="#d4840a"/>
  <!-- Step 3 (tallest, right) -->
  <rect x="62" y="16" width="18" height="68" fill="#d4840a"/>
  <!-- Vertical crosshair line through center -->
  <rect x="46" y="8" width="4" height="84" fill="#d4840a"/>
</svg>
