<!-- T2-13 Hex Focus — incomplete hexagon (5 of 6 sides) with crosshair inside -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Hexagon: 5 of 6 sides, gap at bottom-right edge -->
  <polyline points="75,16 25,16 5,50 25,84 75,84" fill="none" stroke="#d4840a" stroke-width="5" stroke-linecap="butt" stroke-linejoin="miter"/>
  <line x1="95" y1="50" x2="75" y2="16" stroke="#d4840a" stroke-width="5" stroke-linecap="butt"/>
  <!-- Crosshair inside -->
  <rect x="16" y="47.5" width="26" height="5" fill="#d4840a"/>
  <rect x="58" y="47.5" width="26" height="5" fill="#d4840a"/>
  <rect x="47.5" y="22" width="5" height="22" fill="#d4840a"/>
  <rect x="47.5" y="56" width="5" height="22" fill="#d4840a"/>
</svg>
