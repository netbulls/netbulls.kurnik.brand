  <!-- Semi-circle arc (top half) -->
  <path d="M 12,58 A 38,38 0 0 1 88,58" fill="none" stroke="#d4840a" stroke-width="7" stroke-linecap="butt"/>
  <!-- Horizontal crosshair bar -->
