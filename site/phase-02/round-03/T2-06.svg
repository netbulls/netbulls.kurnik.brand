<!-- T2-06 Gapped Frame — square frame with gap at bottom-right + crosshair inside -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Square frame with gap at bottom-right: top, left, bottom (partial), right (partial) -->
  <polyline points="85,15 15,15 15,85 70,85" fill="none" stroke="#d4840a" stroke-width="5" stroke-linecap="butt" stroke-linejoin="miter"/>
  <line x1="85" y1="15" x2="85" y2="70" stroke="#d4840a" stroke-width="5" stroke-linecap="butt"/>
  <!-- Crosshair inside -->
  <rect x="22" y="47.5" width="22" height="5" fill="#d4840a"/>
  <rect x="56" y="47.5" width="22" height="5" fill="#d4840a"/>
  <rect x="47.5" y="22" width="5" height="22" fill="#d4840a"/>
  <rect x="47.5" y="56" width="5" height="22" fill="#d4840a"/>
</svg>
