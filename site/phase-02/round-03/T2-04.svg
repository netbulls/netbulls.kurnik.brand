<!-- T2-04 Signal Target — crosshair with 3 concentric incomplete arcs radiating outward -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Crosshair arms -->
  <rect x="22" y="47" width="20" height="6" fill="#d4840a"/>
  <rect x="58" y="47" width="20" height="6" fill="#d4840a"/>
  <rect x="47" y="22" width="6" height="20" fill="#d4840a"/>
  <rect x="47" y="58" width="6" height="20" fill="#d4840a"/>
  <!-- Inner arc 240° -->
  <path d="M 35.36 64.64 A 20 20 0 1 1 30 50" fill="none" stroke="#d4840a" stroke-width="3" stroke-linecap="butt"/>
  <!-- Mid arc 210° -->
  <path d="M 28.04 71.96 A 30 30 0 1 1 20 50" fill="none" stroke="#d4840a" stroke-width="3" stroke-linecap="butt"/>
  <!-- Outer arc 180° -->
  <path d="M 10 50 A 40 40 0 1 1 50 90" fill="none" stroke="#d4840a" stroke-width="3" stroke-linecap="butt"/>
</svg>
