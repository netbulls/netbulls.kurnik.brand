<!-- T4-03 Offset Squares — filled and stroke squares overlapping at corners -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect x="18" y="18" width="36" height="36" fill="#d4840a" stroke-linecap="butt" stroke-linejoin="miter"/>
  <rect x="46" y="46" width="36" height="36" fill="none" stroke="#d4840a" stroke-width="3.5" stroke-linecap="butt" stroke-linejoin="miter"/>
</svg>
