<!-- T3-08 Architectural Arrow — Upward arrow composed of two angled rectangles meeting at apex. Structural/architectural. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Left angled bar -->
  <polygon points="50,10 62,10 28,90 16,90" fill="#d4840a" stroke-linecap="butt" stroke-linejoin="miter"/>
  <!-- Right angled bar -->
  <polygon points="38,10 50,10 84,90 72,90" fill="#d4840a" stroke-linecap="butt" stroke-linejoin="miter"/>
</svg>
