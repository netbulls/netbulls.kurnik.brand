<!-- T2-03 Ring Crosshair — 270° arc with crosshair arms extending to ring -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 270° arc, gap at top-right -->
  <path d="M 50 10 A 40 40 0 1 0 78.28 21.72" fill="none" stroke="#d4840a" stroke-width="4" stroke-linecap="butt"/>
  <!-- Left arm -->
  <rect x="10" y="47" width="32" height="6" fill="#d4840a"/>
  <!-- Right arm -->
  <rect x="58" y="47" width="32" height="6" fill="#d4840a"/>
  <!-- Top arm -->
  <rect x="47" y="10" width="6" height="32" fill="#d4840a"/>
  <!-- Bottom arm -->
  <rect x="47" y="58" width="6" height="32" fill="#d4840a"/>
</svg>
