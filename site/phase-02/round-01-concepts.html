<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kurnik — Phase 02: Symbol Exploration</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=Manrope:wght@300;400;600;700&display=swap');
  :root {
    --bg: #0e0c0a; --surface: #161310; --surface2: #1e1a16; --border: #2a2420;
    --amber: #d4840a; --amber-light: #f5a623; --amber-dim: #8a5200;
    --text: #e8ddd0; --text-dim: #7a6e62; --text-muted: #4a4238;
    --territory-a: #d4840a; --territory-b: #7eb8a0; --territory-c: #c07a9e; --territory-d: #7a9ec0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Manrope', sans-serif; font-size: 16px; line-height: 1.6; min-height: 100vh; }
  header { padding: 48px 64px 32px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-end; justify-content: space-between; gap: 32px; }
  .header-left h1 { font-family: 'DM Serif Display', serif; font-size: 38px; font-weight: 400; color: var(--text); letter-spacing: -0.5px; }
  .header-left h1 span { color: var(--amber); }
  .header-left p { margin-top: 6px; color: var(--text-dim); font-family: 'DM Mono', monospace; font-size: 14px; letter-spacing: 0.05em; }
  .phase-badge { background: var(--surface2); border: 1px solid var(--border); padding: 8px 16px; font-family: 'DM Mono', monospace; font-size: 13px; color: var(--amber); letter-spacing: 0.12em; text-transform: uppercase; }
  nav { display: flex; gap: 0; padding: 0 64px; border-bottom: 1px solid var(--border); overflow-x: auto; }
  .nav-tab { padding: 16px 24px; font-family: 'DM Mono', monospace; font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; transition: all 0.2s; border: none; background: none; }
  .nav-tab:hover { color: var(--text-dim); }
  .nav-tab.active { color: var(--amber); border-bottom-color: var(--amber); }
  .nav-tab .count { margin-left: 6px; opacity: 0.5; font-size: 12px; }
  main { padding: 40px 64px; }
  .territory-header { margin-bottom: 32px; }
  .territory-header h2 { font-family: 'DM Serif Display', serif; font-size: 26px; font-weight: 400; margin-bottom: 6px; }
  .territory-header p { color: var(--text-dim); font-size: 15px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 64px; }
  .concept { background: var(--surface); border: 1px solid var(--border); padding: 24px 16px 16px; cursor: pointer; transition: all 0.15s; position: relative; display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .concept:hover { border-color: var(--amber-dim); background: var(--surface2); transform: translateY(-1px); }
  .concept.selected { border-color: var(--amber); background: var(--surface2); }
  .concept.selected::after { content: '✓'; position: absolute; top: 8px; right: 8px; color: var(--amber); font-size: 13px; font-family: 'DM Mono', monospace; }
  .concept-num { position: absolute; top: 8px; left: 10px; font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text-muted); letter-spacing: 0.05em; }
  .concept svg { width: 80px; height: 80px; }
  .concept-name { font-size: 13px; color: var(--text-dim); text-align: center; line-height: 1.4; }
  .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 100; align-items: center; justify-content: center; }
  .lightbox.open { display: flex; }
  .lightbox-inner { background: var(--surface); border: 1px solid var(--border); padding: 48px; max-width: 500px; width: 90%; position: relative; display: flex; flex-direction: column; align-items: center; gap: 24px; }
  .lightbox-inner svg { width: 200px; height: 200px; }
  .lightbox-name { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--text); }
  .lightbox-num { font-family: 'DM Mono', monospace; font-size: 14px; color: var(--text-dim); }
  .lightbox-close { position: absolute; top: 16px; right: 16px; background: none; border: none; color: var(--text-dim); font-size: 22px; cursor: pointer; line-height: 1; }
  .lightbox-close:hover { color: var(--text); }
  .lightbox-actions { display: flex; gap: 12px; }
  .btn { padding: 10px 20px; font-family: 'DM Mono', monospace; font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; border: 1px solid var(--border); background: none; color: var(--text-dim); transition: all 0.15s; }
  .btn:hover { border-color: var(--amber-dim); color: var(--text); }
  .btn.primary { border-color: var(--amber); color: var(--amber); }
  .btn.primary:hover { background: var(--amber); color: var(--bg); }
  .shortlist-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); padding: 16px 64px; display: flex; align-items: center; justify-content: space-between; transform: translateY(100%); transition: transform 0.3s; z-index: 50; }
  .shortlist-bar.visible { transform: translateY(0); }
  .shortlist-label { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--text-dim); letter-spacing: 0.08em; text-transform: uppercase; }
  .shortlist-items { display: flex; gap: 8px; flex-wrap: wrap; }
  .shortlist-chip { background: var(--surface2); border: 1px solid var(--amber-dim); padding: 4px 10px; font-family: 'DM Mono', monospace; font-size: 13px; color: var(--amber); }
  .shortlist-clear { background: none; border: none; color: var(--text-muted); font-family: 'DM Mono', monospace; font-size: 13px; cursor: pointer; padding: 4px 8px; }
  .shortlist-clear:hover { color: var(--text-dim); }
  @media (max-width: 768px) { header, nav, main { padding-left: 24px; padding-right: 24px; } .grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); } .shortlist-bar { padding: 16px 24px; } }
</style>
</head>
<body>
<header>
  <div class="header-left">
    <h1><span>Kurnik</span> — Symbol Exploration</h1>
    <p>Phase 02 · Round 01 · 90 concepts · 4 territories</p>
  </div>
  <div class="phase-badge">Phase 02 / R01</div>
</header>
<nav>

  <button class="nav-tab" onclick="showTerritory('d', event)" style="color: var(--territory-d)">Nested / Space <span class="count">22</span></button>
  <button class="nav-tab" onclick="showTerritory('shortlist', event)" id="shortlist-tab">Shortlist <span class="count" id="shortlist-count">0</span></button>
</nav>
<main id="main-content"></main>
<div class="lightbox" id="lightbox">
  <div class="lightbox-inner">
    <button class="lightbox-close" onclick="closeLightbox()">×</button>
    <div id="lightbox-svg"></div>
    <div class="lightbox-name" id="lightbox-name"></div>
    <div class="lightbox-num" id="lightbox-num"></div>
    <div class="lightbox-actions">
      <button class="btn" onclick="closeLightbox()">Close</button>
      <button class="btn primary" id="lightbox-select-btn" onclick="toggleFromLightbox()">Add to Shortlist</button>
    </div>
  </div>
</div>
<div class="shortlist-bar" id="shortlist-bar">
  <span class="shortlist-label">Shortlist</span>
  <div class="shortlist-items" id="shortlist-items"></div>
  <button class="shortlist-clear" onclick="clearShortlist()">Clear all</button>
</div>

const territoryNames = {a:'Geometric Rooster',b:'Egg + Rooster Fusion',c:'Comb / Crown',d:'Nested / Negative Space'};
const territoryColors = {a:'var(--territory-a)',b:'var(--territory-b)',c:'var(--territory-c)',d:'var(--territory-d)'};
let currentTerritory = 'all';
let shortlist = new Set();
let lightboxCurrent = null;

function renderAll() {
  const main = document.getElementById('main-content');
  if (currentTerritory === 'shortlist') { renderShortlistView(main); return; }
  const territories = currentTerritory === 'all' ? ['a','b','c','d'] : [currentTerritory];
  main.innerHTML = '';
  territories.forEach(t => {
    const items = concepts.filter(c => c.territory === t);
    const section = document.createElement('div');
    section.innerHTML = `<div class="territory-header"><h2 style="color:${territoryColors[t]}">${territoryNames[t]}</h2><p>${items.length} concepts — click to enlarge, add to shortlist</p></div><div class="grid" id="grid-${t}"></div>`;
    main.appendChild(section);
    const grid = section.querySelector(`#grid-${t}`);
    items.forEach(c => {
      const div = document.createElement('div');
      div.className = 'concept' + (shortlist.has(c.id) ? ' selected' : '');
      div.innerHTML = `<span class="concept-num">${c.id}</span>${c.svg}<span class="concept-name">${c.name}</span>`;
      div.addEventListener('click', () => openLightbox(c));
      grid.appendChild(div);
    });
  });
}

function renderShortlistView(main) {
  main.innerHTML = '';
  if (shortlist.size === 0) { main.innerHTML = '<p style="color:var(--text-muted);padding:40px 0;font-family:DM Mono,monospace">No concepts shortlisted yet.</p>'; return; }
  const header = document.createElement('div');
  header.className = 'territory-header';
  header.innerHTML = `<h2>Shortlisted Concepts</h2><p>${shortlist.size} selected</p>`;
  main.appendChild(header);
  const grid = document.createElement('div');
  grid.className = 'grid';
  concepts.filter(c => shortlist.has(c.id)).forEach(c => {
    const div = document.createElement('div');
    div.className = 'concept selected';
    div.style.borderColor = territoryColors[c.territory];
    div.innerHTML = `<span class="concept-num">${c.id}</span>${c.svg}<span class="concept-name">${c.name}</span>`;
    div.addEventListener('click', () => openLightbox(c));
    grid.appendChild(div);
  });
  main.appendChild(grid);
}

function showTerritory(t, e) {
  currentTerritory = t;
  document.querySelectorAll('.nav-tab').forEach(tab => tab.classList.remove('active'));
  e.target.classList.add('active');
  renderAll();
}

function openLightbox(c) {
  lightboxCurrent = c;
  const svgContainer = document.getElementById('lightbox-svg');
  svgContainer.innerHTML = c.svg;
  const svgEl = svgContainer.querySelector('svg');
  if (svgEl) { svgEl.style.width = '200px'; svgEl.style.height = '200px'; }
  document.getElementById('lightbox-name').textContent = c.name;
  document.getElementById('lightbox-num').textContent = `${c.id} · ${territoryNames[c.territory]}`;
  const btn = document.getElementById('lightbox-select-btn');
  btn.textContent = shortlist.has(c.id) ? 'Remove from Shortlist' : 'Add to Shortlist';
  btn.className = shortlist.has(c.id) ? 'btn' : 'btn primary';
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); lightboxCurrent = null; }

function toggleFromLightbox() {
