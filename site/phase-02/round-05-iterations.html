<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kurnik — Round 05 Iterations</title>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e0c0a;
    --amber: #d4840a;
    --amber-light: #f5a623;
    --text: #e8ddd0;
    --text-dim: #7a6e62;
    --border: #2a2420;
    --card-bg: #161310;
    --card-hover: #1c1915;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Manrope', sans-serif; }

  /* Header */
  .header { padding: 40px 48px 24px; border-bottom: 1px solid var(--border); }
  .header h1 { font-family: 'DM Serif Display', serif; font-size: 30px; color: var(--amber); margin-bottom: 4px; }
  .header p { color: var(--text-dim); font-size: 16px; }

  /* Export bar */
  .export-bar {
    position: sticky; top: 0; z-index: 100; background: var(--bg);
    border-bottom: 1px solid var(--border); padding: 10px 48px;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  .btn {
    font-family: 'DM Mono', monospace; font-size: 14px; padding: 7px 14px;
    border: 1px solid var(--border); border-radius: 6px;
    background: var(--card-bg); color: var(--text); cursor: pointer; transition: all 0.15s;
  }
  .btn:hover { background: var(--card-hover); border-color: var(--amber); color: var(--amber); }
  .btn-primary { background: var(--amber); color: var(--bg); border-color: var(--amber); font-weight: 600; }
  .btn-primary:hover { background: var(--amber-light); border-color: var(--amber-light); }
  .status { font-family: 'DM Mono', monospace; font-size: 14px; color: var(--text-dim); margin-left: auto; }

  /* Tabs */
  .tabs { padding: 12px 48px; display: flex; gap: 6px; flex-wrap: wrap; border-bottom: 1px solid var(--border); }
  .tab {
    font-family: 'DM Mono', monospace; font-size: 14px; padding: 6px 12px;
    border: 1px solid var(--border); border-radius: 6px;
    background: transparent; color: var(--text-dim); cursor: pointer; transition: all 0.15s;
  }
  .tab:hover { border-color: var(--amber); color: var(--amber); }
  .tab.active { background: var(--amber); color: var(--bg); border-color: var(--amber); }
  .tab-count { opacity: 0.6; }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; right: 24px; background: var(--amber); color: var(--bg);
    padding: 10px 20px; border-radius: 6px; font-family: 'DM Mono', monospace;
    font-size: 15px; font-weight: 600; opacity: 0; transform: translateY(10px);
    transition: all 0.3s; pointer-events: none; z-index: 200;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* Section headers */
  .section-header {
    padding: 24px 48px 12px; display: flex; align-items: baseline; gap: 12px;
  }
  .section-header h2 {
    font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--amber);
  }
  .section-meta {
    font-family: 'DM Mono', monospace; font-size: 13px; color: var(--text-dim);
  }
  .section-origin {
    padding: 0 48px 16px; display: flex; align-items: center; gap: 16px;
  }
  .origin-card {
    width: 64px; height: 64px; background: var(--bg); border: 1px dashed var(--border);
    border-radius: 6px; display: flex; align-items: center; justify-content: center;
    opacity: 0.7;
  }
  .origin-card img { width: 44px; height: 44px; }
  .origin-label { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--text-dim); }

  /* Grid */
  .grid {
    padding: 0 48px 32px; display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px;
  }

  /* Cards */
  .card {
    background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 12px; cursor: pointer; transition: all 0.15s; position: relative;
  }
  .card:hover { border-color: #3a3430; transform: translateY(-2px); }
  .card.shortlisted { border-color: var(--amber); }
  .card .preview {
    width: 100%; aspect-ratio: 1; background: var(--bg); border-radius: 6px;
    display: flex; align-items: center; justify-content: center; margin-bottom: 8px;
  }
  .card .preview img { width: 70%; height: 70%; }
  .card .card-id {
    font-family: 'DM Mono', monospace; font-size: 13px; color: var(--amber); font-weight: 600;
  }
  .card .card-desc {
    font-size: 13px; color: var(--text-dim); line-height: 1.4;
    max-height: 2.8em; overflow: hidden;
  }
  .card .star-btn {
    position: absolute; top: 8px; right: 8px; width: 24px; height: 24px;
    border: none; background: transparent; color: var(--text-dim); cursor: pointer;
    font-size: 16px; transition: all 0.15s; border-radius: 50%;
  }
  .card .star-btn:hover { color: var(--amber); background: rgba(212,132,10,0.1); }
  .card.shortlisted .star-btn { color: var(--amber); }

  /* Lightbox */
  .lightbox {
    display: none; position: fixed; inset: 0; z-index: 300;
    background: rgba(14,12,10,0.95); align-items: center; justify-content: center;
    flex-direction: column;
  }
  .lightbox.open { display: flex; }
  .lightbox-close {
    position: absolute; top: 20px; right: 24px; background: none; border: none;
    color: var(--text); font-size: 30px; cursor: pointer;
  }
  .lightbox-svg { width: 320px; height: 320px; margin-bottom: 16px; }
  .lightbox-svg img { width: 100%; height: 100%; }
  .lightbox-info { text-align: center; max-width: 500px; }
  .lightbox-id { font-family: 'DM Mono', monospace; font-size: 16px; color: var(--amber); margin-bottom: 4px; }
  .lightbox-desc { font-size: 16px; color: var(--text-dim); margin-bottom: 16px; }
  .lightbox-nav { display: flex; gap: 12px; }
  .lightbox-nav button {
    font-family: 'DM Mono', monospace; font-size: 15px; padding: 8px 20px;
    border: 1px solid var(--border); border-radius: 6px; background: var(--card-bg);
    color: var(--text); cursor: pointer;
  }
  .lightbox-nav button:hover { border-color: var(--amber); color: var(--amber); }

  /* Comment in lightbox */
  .lightbox-comment {
    width: 100%; max-width: 500px; margin-top: 12px;
  }
  .lightbox-comment textarea {
    width: 100%; min-height: 60px; padding: 10px; background: var(--bg);
    border: 1px solid var(--border); border-radius: 6px; color: var(--text);
    font-family: 'Manrope', sans-serif; font-size: 15px; resize: vertical;
  }
  .lightbox-comment textarea::placeholder { color: #4a4035; }
  .lightbox-comment textarea:focus { outline: none; border-color: var(--amber); }

  .lightbox-rating { display: flex; gap: 4px; margin-bottom: 8px; }
  .rating-dot {
    width: 26px; height: 26px; border-radius: 50%; border: 2px solid var(--border);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-family: 'DM Mono', monospace; font-size: 13px; color: var(--text-dim);
    transition: all 0.15s;
  }
  .rating-dot:hover { border-color: var(--amber); color: var(--amber); }
  .rating-dot.active { background: var(--amber); border-color: var(--amber); color: var(--bg); font-weight: 600; }

  .lightbox-tags { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
  .ltag {
    font-family: 'DM Mono', monospace; font-size: 13px; padding: 3px 10px;
    border-radius: 20px; border: 1px solid var(--border); background: transparent;
    color: var(--text-dim); cursor: pointer; transition: all 0.15s;
  }
  .ltag:hover { border-color: var(--amber); color: var(--amber); }
  .ltag.active { background: var(--amber); border-color: var(--amber); color: var(--bg); }
</style>

nes Leftward, All Stroke Varying Weight", "file": "T509-10.svg"}, {"id": "T509-11", "parent": "T5-09", "desc": "T509-11 Rightward Perspective, Top Filled Bottom Stroke", "file": "T509-11.svg"}, {"id": "T509-12", "parent": "T5-09", "desc": "T509-12 Rightward Perspective, Top Filled Bottom Stroke, Tight Gap", "file": "T509-12.svg"}, {"id": "T509-13", "parent": "T5-09", "desc": "T509-13 Steep Leftward Perspective, Dramatic Angle", "file": "T509-13.svg"}, {"id": "T509-14", "parent": "T5-09", "desc": "T509-14 Steep Rightward Perspective, Dramatic Angle", "file": "T509-14.svg"}, {"id": "T509-15", "parent": "T5-09", "desc": "T509-15 Shallow Leftward Perspective, Subtle Wide Planes", "file": "T509-15.svg"}, {"id": "T509-16", "parent": "T5-09", "desc": "T509-16 Shallow Rightward Perspective, Subtle Wide Planes", "file": "T509-16.svg"}, {"id": "T509-17", "parent": "T5-09", "desc": "T509-17 Overlapping Planes, Shared Edge, No Gap", "file": "T509-17.svg"}, {"id": "T509-18", "parent": "T5-09", "desc": "T509-18 Two Planes With Thin Connecting Line", "file": "T509-18.svg"}, {"id": "T509-19", "parent": "T5-09", "desc": "T509-19 Different Widths, Narrow Top Wide Bottom", "file": "T509-19.svg"}, {"id": "T509-20", "parent": "T5-09", "desc": "T509-20 Three Planes Fanning From Shared Left Edge", "file": "T509-20.svg"}];
const parents = {"B25": {"name": "Arrow Void", "rating": 4, "round": "R02"}, "H15": {"name": "Bracket Cross", "rating": 3, "round": "R02"}, "H20": {"name": "Asymmetric Rose", "rating": 2, "round": "R02"}, "F20": {"name": "Chevron Cascade", "rating": 4, "round": "R02"}, "T2-12": {"name": "Bracket Cascade", "rating": 3, "round": "R03"}, "E26": {"name": "Convergent Triangles", "rating": 4, "round": "R02"}, "F06": {"name": "Split Diamond", "rating": 4, "round": "R02"}, "G12": {"name": "Isometric Planes", "rating": 4, "round": "R02"}, "T5-02": {"name": "Stacked Slabs", "rating": 4, "round": "R03"}, "T5-09": {"name": "Perspective Planes", "rating": 3, "round": "R03"}, "T1-10": {"name": "Rotated Squares", "rating": 4, "round": "R03"}};
const parentOrder = ["B25", "H15", "H20", "F20", "T2-12", "E26", "F06", "G12", "T5-02", "T5-09", "T1-10"];
const originPaths = {"B25": "round-02/B25.svg", "H15": "round-02/H15.svg", "H20": "round-02/H20.svg", "F20": "round-02/F20.svg", "T2-12": "round-03/T2-12.svg", "E26": "round-02/E26.svg", "F06": "round-02/F06.svg", "G12": "round-02/G12.svg", "T5-02": "round-03/T5-02.svg", "T5-09": "round-03/T5-09.svg", "T1-10": "round-03/T1-10.svg"};

let currentFilter = 'all';
let filteredList = [...concepts];
let lbIndex = -1;

function loadState() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; } }
function saveState(s) { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); updateStatus(); }
function getS(id) { const s = loadState(); return s[id] || { rating:0, comment:'', tags:[], shortlisted:false }; }
function setS(id, d) { const s = loadState(); s[id] = { ...getS(id), ...d }; saveState(s); }

function updateStatus() {
  const s = loadState();
  const reviewed = Object.values(s).filter(x => x.comment || x.rating > 0 || (x.tags && x.tags.length > 0) || x.shortlisted).length;
  document.getElementById('status').textContent = reviewed + '/220 reviewed';
  const sl = Object.entries(s).filter(([k,v]) => v.shortlisted).length;
  const sc = document.getElementById('shortlist-count');
  if (sc) sc.textContent = sl;
}

function showToast(m) {
  const t = document.getElementById('toast'); t.textContent = m;
  t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000);
}

function buildExport() {
  const s = loadState();
  return concepts.map(c => {
    const st = s[c.id] || { rating:0, comment:'', tags:[], shortlisted:false };
    return { id: c.id, parent: c.parent, parentName: parents[c.parent]?.name || '', rating: st.rating, tags: st.tags||[], shortlisted: !!st.shortlisted, comment: st.comment||'' };
  }).filter(c => c.rating > 0 || c.comment || c.tags.length > 0 || c.shortlisted);
}

function exportJSON() {
  const d = buildExport(); if (!d.length) { showToast('Nothing yet'); return; }
  const b = new Blob([JSON.stringify(d,null,2)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(b);
  a.download = 'kurnik-r05-review.json'; a.click(); showToast('Exported '+d.length);
}

function copyJSON() {
  const d = buildExport(); if (!d.length) { showToast('Nothing yet'); return; }
  navigator.clipboard.writeText(JSON.stringify(d,null,2)).then(() => showToast('Copied'));
}

function clearAll() {
  if (!confirm('Clear everything?')) return;
  localStorage.removeItem(STORAGE_KEY); render(); showToast('Cleared');
}

function toggleShortlist(id) {
  if (!id && lbIndex >= 0) id = filteredList[lbIndex].id;
  if (!id) return;
  const s = getS(id); setS(id, { shortlisted: !s.shortlisted });
  render();
  if (lbIndex >= 0) updateLightbox();
}

function render() {
  const content = document.getElementById('content');
  content.innerHTML = '';
  const state = loadState();

  if (currentFilter === 'shortlist') {
    filteredList = concepts.filter(c => (state[c.id] || {}).shortlisted);
    const grid = document.createElement('div'); grid.className = 'grid';
    grid.style.padding = '24px 48px';
    filteredList.forEach((c,i) => grid.appendChild(makeCard(c,i,state)));
    if (!filteredList.length) { content.innerHTML = '<p style="padding:48px;color:var(--text-dim)">No shortlisted variants yet.</p>'; return; }
    content.appendChild(grid);
  } else if (currentFilter === 'all') {
    filteredList = [...concepts];
    parentOrder.forEach(pid => {
      const items = concepts.filter(c => c.parent === pid);
      const p = parents[pid];
      // Section header
      const hdr = document.createElement('div'); hdr.className = 'section-header';
      hdr.innerHTML = '<h2>' + pid + ' — ' + p.name + '</h2><span class="section-meta">' + p.round + ' / strength ' + p.rating + ' / ' + items.length + ' variants</span>';
      content.appendChild(hdr);
      // Origin
      const orig = document.createElement('div'); orig.className = 'section-origin';
      orig.innerHTML = '<div class="origin-card"><img src="' + originPaths[pid] + '" alt="' + pid + '"></div><span class="origin-label">Source: ' + pid + '</span>';
      content.appendChild(orig);
      // Grid
      const grid = document.createElement('div'); grid.className = 'grid';
      items.forEach(c => {
        const gi = filteredList.indexOf(c);
        grid.appendChild(makeCard(c, gi, state));
      });
      content.appendChild(grid);
    });
  } else {
    filteredList = concepts.filter(c => c.parent === currentFilter);
    const p = parents[currentFilter];
    const hdr = document.createElement('div'); hdr.className = 'section-header';
    hdr.innerHTML = '<h2>' + currentFilter + ' — ' + p.name + '</h2><span class="section-meta">' + p.round + ' / strength ' + p.rating + ' / ' + filteredList.length + ' variants</span>';
    content.appendChild(hdr);
    const orig = document.createElement('div'); orig.className = 'section-origin';
    orig.innerHTML = '<div class="origin-card"><img src="' + originPaths[currentFilter] + '" alt="' + currentFilter + '"></div><span class="origin-label">Source: ' + currentFilter + '</span>';
    content.appendChild(orig);
    const grid = document.createElement('div'); grid.className = 'grid';
    filteredList.forEach((c,i) => grid.appendChild(makeCard(c,i,state)));
    content.appendChild(grid);
  }
  updateStatus();
}

function makeCard(c, idx, state) {
  const s = state[c.id] || {};
  const card = document.createElement('div');
  card.className = 'card' + (s.shortlisted ? ' shortlisted' : '');
  const hasReview = s.comment || s.rating > 0 || (s.tags && s.tags.length > 0);
  if (hasReview) card.style.borderLeftWidth = '3px';
  if (hasReview) card.style.borderLeftColor = 'var(--amber)';
  // Clean desc: strip the ID prefix if present
  let desc = c.desc.replace(/^[A-Z0-9]+-\d+\s+/i, '');
  card.innerHTML = `
    <div class="preview"><img src="round-05/${c.file}" alt="${c.id}"></div>
    <div class="card-id">${c.id}</div>
    <div class="card-desc">${desc}</div>
    <button class="star-btn" onclick="event.stopPropagation();toggleShortlist('${c.id}')">${s.shortlisted ? '\u2605' : '\u2606'}</button>
  `;
  card.addEventListener('click', () => openLightbox(idx));
  return card;
}

function openLightbox(idx) {
  lbIndex = idx; updateLightbox();
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  lbIndex = -1;
}

function navLightbox(dir) {
  if (lbIndex < 0) return;
  lbIndex = (lbIndex + dir + filteredList.length) % filteredList.length;
  updateLightbox();
}

function updateLightbox() {
  if (lbIndex < 0 || !filteredList[lbIndex]) return;
  const c = filteredList[lbIndex];
  const s = getS(c.id);
  document.getElementById('lb-svg').innerHTML = '<img src="round-05/' + c.file + '" alt="' + c.id + '">';
  let desc = c.desc.replace(/^[A-Z0-9]+-\d+\s+/i, '');
  document.getElementById('lb-id').textContent = c.id + ' (' + c.parent + ' — ' + (parents[c.parent]?.name||'') + ')';
  document.getElementById('lb-desc').textContent = desc;
  document.getElementById('lb-star-btn').innerHTML = (s.shortlisted ? '\u2605' : '\u2606') + ' Shortlist';
  // Rating
  const rh = document.getElementById('lb-rating');
  rh.innerHTML = [1,2,3,4,5].map(n => '<div class="rating-dot ' + (s.rating===n?'active':'') + '" onclick="setLbRating(' + n + ')">' + n + '</div>').join('');
  // Tags
  const th = document.getElementById('lb-tags');
  th.innerHTML = TAGS.map(t => '<button class="ltag ' + ((s.tags||[]).includes(t)?'active':'') + '" onclick="toggleLbTag(\'' + t + '\')">' + t + '</button>').join('');
  // Comment
  const cm = document.getElementById('lb-comment');
  cm.value = s.comment || '';
  cm.oninput = () => { clearTimeout(cm._t); cm._t = setTimeout(() => setS(c.id, {comment: cm.value}), 300); };
}

function setLbRating(n) {
  const c = filteredList[lbIndex]; if (!c) return;
  const s = getS(c.id); const v = s.rating === n ? 0 : n;
  setS(c.id, {rating: v}); updateLightbox(); render();
}

function toggleLbTag(t) {
  const c = filteredList[lbIndex]; if (!c) return;
  const s = getS(c.id); const tags = s.tags || [];
  const idx = tags.indexOf(t);
  if (idx >= 0) tags.splice(idx,1); else tags.push(t);
  setS(c.id, {tags}); updateLightbox();
}

// Tab clicks
document.getElementById('tabs').addEventListener('click', e => {
  const tab = e.target.closest('.tab'); if (!tab) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  currentFilter = tab.dataset.filter;
  render();
});

// Keyboard
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') navLightbox(-1);
  if (e.key === 'ArrowRight') navLightbox(1);
  if (e.key === 's' && lbIndex >= 0) toggleShortlist();
  if ((e.metaKey||e.ctrlKey) && e.key === 'e') { e.preventDefault(); exportJSON(); }
});

render();
</script>
</body>
