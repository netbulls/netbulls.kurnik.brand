<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- T212-17 Filled solid L-shape brackets + single bold right chevron -->
  <!-- Top-left L -->
  <polygon points="8,8 30,8 30,14 14,14 14,30 8,30" fill="#d4840a"/>
  <!-- Top-right L -->
  <polygon points="70,8 92,8 92,30 86,30 86,14 70,14" fill="#d4840a"/>
  <!-- Bottom-left L -->
  <polygon points="8,70 14,70 14,86 30,86 30,92 8,92" fill="#d4840a"/>
  <!-- Bottom-right L -->
  <polygon points="86,70 92,70 92,92 70,92 70,86 86,86" fill="#d4840a"/>
  <!-- Bold right chevron -->
  <polyline points="34,30 64,50 34,70" fill="none" stroke="#d4840a" stroke-width="8" stroke-linecap="butt" stroke-linejoin="miter"/>
</svg>
