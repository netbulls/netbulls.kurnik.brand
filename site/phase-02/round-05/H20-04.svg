  <line x1="10" y1="50" x2="40" y2="50" stroke="#d4840a" stroke-width="2.5" stroke-linecap="butt" stroke-linejoin="miter"/>
  <line x1="40" y1="40" x2="44" y2="44" stroke="#d4840a" stroke-width="2.5" stroke-linecap="butt" stroke-linejoin="miter"/>
  <line x1="56" y1="44" x2="60" y2="40" stroke="#d4840a" stroke-width="2.5" stroke-linecap="butt" stroke-linejoin="miter"/>
