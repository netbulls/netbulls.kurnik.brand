<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- T110-02 Concentric Rotated Squares — thick strokes, 8px outer, 6px inner, tighter inner -->
  <rect x="10" y="10" width="80" height="80" fill="none" stroke="#d4840a" stroke-width="8" stroke-linecap="butt" stroke-linejoin="miter"/>
  <rect x="26" y="26" width="48" height="48" fill="none" stroke="#d4840a" stroke-width="6" stroke-linecap="butt" stroke-linejoin="miter" transform="rotate(45 50 50)"/>
</svg>
